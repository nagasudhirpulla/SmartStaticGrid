name: Publish NuGet Package

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/workflows/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Nagasudhir.SmartStaticGrid/Nagasudhir.SmartStaticGrid.csproj

      - name: Extract version from tag
        # Strip refs/tags/ and optional leading "v" from the tag to produce a valid semver like 1.0.0
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore Nagasudhir.SmartStaticGrid/Nagasudhir.SmartStaticGrid.csproj

      - name: Build
        run: dotnet build Nagasudhir.SmartStaticGrid/Nagasudhir.SmartStaticGrid.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Nagasudhir.SmartStaticGrid/Nagasudhir.SmartStaticGrid.csproj -c Release -o ./artifacts -p:PackageVersion=$VERSION --no-build

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" -k "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
